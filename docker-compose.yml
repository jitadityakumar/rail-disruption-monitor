services:
  app:
    build:
      context: ./app
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - db-data:/data
    environment:
      DB_PATH: /data/rail.db
      SCAN_DOW: sun
      SCAN_HOUR: "6"
      SCAN_MINUTE: "0"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "7"

volumes:
  db-data:

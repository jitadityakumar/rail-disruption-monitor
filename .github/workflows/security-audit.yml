name: Security Audit

on:
  schedule:
    - cron: '0 12 * * 5'  # Every Friday at noon UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Build ignore flags from accepted-risks.txt
        id: ignore-flags
        run: |
          FLAGS=""
          if [ -f security/accepted-risks.txt ]; then
            while IFS= read -r line; do
              cve=$(echo "$line" | sed 's/#.*//' | tr -d '[:space:]')
              if [[ "$cve" =~ ^CVE-[0-9]{4}-[0-9]+$ ]]; then
                FLAGS="$FLAGS --ignore-vuln $cve"
              fi
            done < security/accepted-risks.txt
          fi
          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"

      - name: Run pip-audit
        id: audit
        run: |
          set +e
          OUTPUT=$(pip-audit -r app/requirements.txt ${{ steps.ignore-flags.outputs.flags }} 2>&1)
          EXIT_CODE=$?
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Ensure security-audit label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "security-audit" --color "e11d48" --description "Automated security audit finding" 2>/dev/null || true

      - name: Check for existing open audit issue
        id: existing-issue
        if: steps.audit.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list \
            --label "security-audit" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Create GitHub issue if vulnerabilities found
        if: steps.audit.outputs.exit_code != '0' && steps.existing-issue.outputs.number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Security audit: pip-audit found vulnerabilities ($(date '+%Y-%m-%d'))" \
            --label "security-audit" \
            --body "$(cat <<'EOF'
          ## pip-audit report

          Vulnerabilities were found in Python dependencies.

          To accept a risk and suppress future alerts for a specific CVE, add it to \`security/accepted-risks.txt\` with a comment explaining why.

          ### Output

          \`\`\`
          ${{ steps.audit.outputs.output }}
          \`\`\`

          ---
          *Generated by the [Security Audit workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          EOF
          )"

      - name: Comment on existing issue with latest results
        if: steps.audit.outputs.exit_code != '0' && steps.existing-issue.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.existing-issue.outputs.number }} \
            --body "$(cat <<'EOF'
          ## Re-scan — $(date '+%Y-%m-%d')

          Vulnerabilities still present:

          \`\`\`
          ${{ steps.audit.outputs.output }}
          \`\`\`

          *[Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          EOF
          )"

      - name: Close existing issue if audit is now clean
        if: steps.audit.outputs.exit_code == '0' && steps.existing-issue.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ steps.existing-issue.outputs.number }} \
            --comment "Audit clean as of $(date '+%Y-%m-%d') — closing. Re-opened automatically if new vulnerabilities are found."

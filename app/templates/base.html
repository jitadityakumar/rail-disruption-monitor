<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Rail Monitor{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v={{ css_version }}">
</head>
<body>
  <nav>
    <span class="nav-title">Rail Monitor</span>
    <a href="/admin" class="{{ 'active' if request.url.path == '/admin' else '' }}">Admin</a>
    <a href="/reports" class="{{ 'active' if request.url.path == '/reports' else '' }}">Reports</a>
    <a href="/kiosk" class="{{ 'active' if request.url.path == '/kiosk' else '' }}">Kiosk</a>
  </nav>
  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>

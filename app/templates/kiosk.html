<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rail Monitor — Kiosk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .kiosk-body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .kiosk-page { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .kiosk-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 24px; border-bottom: 1px solid var(--border-sub);
      flex-shrink: 0;
    }
    .kiosk-title { font-size: 13px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.07em; text-transform: uppercase; }
    .kiosk-date  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .kiosk-clock { font-size: 1.8rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text-pri); }
    .kiosk-main  { flex: 1; overflow: hidden; }
    .kiosk-main .reports-layout { height: 100%; }
    .kiosk-footer {
      font-size: 11px; color: var(--text-muted); text-align: center;
      padding: 6px; border-top: 1px solid var(--border-sub); flex-shrink: 0;
    }
  </style>
</head>
<body class="kiosk-body">
<div class="kiosk-page">

  <div class="kiosk-header">
    <div>
      <div class="kiosk-title">Rail Disruption Monitor</div>
      <div class="kiosk-date" id="kiosk-date"></div>
    </div>
    <div class="kiosk-clock" id="kiosk-clock"></div>
  </div>

  <div class="kiosk-main">
    <div class="reports-layout">
      <!-- Left: unified calendar -->
      <div class="reports-cal-panel" id="calPanel">
        <div class="info-msg" style="padding:2rem;text-align:center">Loading…</div>
      </div>
      <!-- Right: routes + disruption list -->
      <div class="reports-disrupt-panel">
        <div class="reports-panel-header">
          <span class="reports-panel-title">Routes Monitored</span>
        </div>
        <div id="routesList"><div class="info-msg" style="padding:1rem">Loading…</div></div>
        <div class="reports-panel-header" style="margin-top:8px">
          <span class="reports-panel-title">Upcoming Disruptions</span>
        </div>
        <div id="disruptionList"><div class="info-msg" style="padding:1rem">Loading…</div></div>
      </div>
    </div>
  </div>

  <div class="kiosk-footer" id="kiosk-footer">Refreshes every 5 minutes</div>
</div>

<!-- Day-detail modal -->
<div class="modal-overlay" id="day-detail-modal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h3 id="day-detail-title">Detail</h3>
      <button class="modal-close" onclick="closeModal('day-detail-modal')">✕</button>
    </div>
    <div id="day-detail-body"></div>
  </div>
</div>

<script src="/static/app.js"></script>
<script>
/* ── Clock ── */
function updateClock() {
  const now = new Date();
  document.getElementById('kiosk-clock').textContent =
    now.toLocaleTimeString('en-GB', { timeZone: 'Europe/London', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('kiosk-date').textContent =
    now.toLocaleDateString('en-GB', { timeZone: 'Europe/London', weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

/* ── Icons ── */
function issueIconSvg(type) {
  const s = 'stroke="#f87171"';
  const common = `width="16" height="16" viewBox="0 0 24 24" fill="none" ${s} stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;vertical-align:-3px"`;
  if (type === 'bus')   return `<svg ${common}><path d="M4 17V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v11"/><path d="M4 11h16"/><path d="M4 17h16"/><path d="M7 17v2"/><path d="M17 17v2"/><circle cx="8" cy="14.5" r="0.6" fill="#f87171"/><circle cx="16" cy="14.5" r="0.6" fill="#f87171"/></svg>`;
  if (type === 'time')  return `<svg ${common}><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>`;
  if (type === 'route') return `<svg ${common}><circle cx="5" cy="6" r="2"/><circle cx="19" cy="18" r="2"/><path d="M7 6h6a4 4 0 0 1 0 8h-2a4 4 0 0 0 0 8h6"/></svg>`;
  return `<svg ${common}><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
}

/* ── Date helpers ── */
function toISO(dt) {
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}
function formatDateFull(iso) {
  return new Date(iso + 'T12:00:00').toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}
function formatDateShort(iso) {
  return new Date(iso + 'T12:00:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

/* ── Build unified day map from all routes ── */
function buildDayMap(routes) {
  const allScanDays = new Set(routes.flatMap(r => r.scan_days));
  const allDates = new Set(routes.flatMap(r => Object.keys(r.per_day || {})));
  const dayMap = {};
  for (const iso of allDates) {
    let anyDisrupted = false;
    let anyData = false;
    const routeDetails = [];
    for (const route of routes) {
      const dayData = (route.per_day || {})[iso];
      if (!dayData) continue;
      anyData = true;
      if (dayData.status === 'disrupted') anyDisrupted = true;
      routeDetails.push({ route, dayData });
    }
    if (!anyData) continue;
    dayMap[iso] = { status: anyDisrupted ? 'disrupted' : 'clear', routeDetails };
  }
  return { dayMap, allScanDays };
}

/* ── Calendar ── */
function renderCalendar(routes, dayMap, allScanDays) {
  const panel = document.getElementById('calPanel');
  panel.innerHTML = '';

  const today = new Date();
  today.setHours(0,0,0,0);
  const todayISO = toISO(today);
  const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const frag = document.createDocumentFragment();

  for (let m = 0; m < 2; m++) {
    const year  = today.getFullYear() + Math.floor((today.getMonth() + m) / 12);
    const month = (today.getMonth() + m) % 12;
    const firstDay = new Date(year, month, 1);
    const lastDay  = new Date(year, month + 1, 0);
    const startOffset = (firstDay.getDay() + 6) % 7;

    const block = document.createElement('div');
    block.className = 'reports-month-block';

    const title = document.createElement('div');
    title.className = 'reports-month-title';
    title.textContent = firstDay.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    block.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'reports-cal-grid';

    for (const lbl of DOW) {
      const h = document.createElement('div');
      h.className = 'reports-cal-dow';
      h.textContent = lbl;
      grid.appendChild(h);
    }

    for (let i = 0; i < startOffset; i++) {
      const e = document.createElement('div');
      e.className = 'reports-cal-cell reports-cal-cell--empty';
      grid.appendChild(e);
    }

    for (let day = 1; day <= lastDay.getDate(); day++) {
      const dateObj = new Date(year, month, day);
      dateObj.setHours(0,0,0,0);
      const iso      = toISO(dateObj);
      const dow      = (dateObj.getDay() + 6) % 7;
      const isToday  = iso === todayISO;
      const entry    = dayMap[iso];
      const monitored = allScanDays.has(dow);

      let state;
      if (!monitored)  state = 'unmonitored';
      else if (entry)  state = entry.status;
      else             state = 'future';

      const cell = document.createElement('div');
      cell.className = `reports-cal-cell reports-cal-cell--${state}${isToday ? ' reports-cal-cell--today' : ''}`;
      cell.textContent = day;

      if (entry) {
        cell.style.cursor = 'pointer';
        cell.addEventListener('click', () => showDayDetail(iso, entry.routeDetails));
      }

      grid.appendChild(cell);
    }

    block.appendChild(grid);
    frag.appendChild(block);
  }

  const legend = document.createElement('div');
  legend.className = 'report-legend';
  legend.innerHTML = `
    <div class="report-legend-item"><div class="report-legend-swatch" style="background:#2ec76a"></div><span class="report-legend-label">Clear</span></div>
    <div class="report-legend-item"><div class="report-legend-swatch" style="background:#e84545"></div><span class="report-legend-label">Disrupted</span></div>
    <div class="report-legend-item"><div class="report-legend-swatch" style="background:#252530;border:1px solid #32323f"></div><span class="report-legend-label">Pending scan</span></div>
    <div class="report-legend-item"><div class="report-legend-swatch" style="background:#18181e;border:1px solid #21212a"></div><span class="report-legend-label">Not monitored</span></div>
    <div class="report-legend-item"><div class="report-legend-swatch report-legend-swatch--today"></div><span class="report-legend-label">Today</span></div>`;

  panel.appendChild(frag);
  panel.appendChild(legend);
}

/* ── Routes monitored ── */
const DOW_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function renderRoutesList(routes) {
  const el = document.getElementById('routesList');
  el.innerHTML = routes.map(route => {
    const days = route.scan_days.map(d => DOW_LABELS[d]).join(', ');
    const scanned = route.last_scanned_at ? route.last_scanned_at.slice(0, 10) : 'Never';
    return `
      <div class="rmc">
        <div class="rmc-name">${esc(route.display_name)}</div>
        <div class="rmc-meta">
          <span class="rmc-item"><span class="rmc-label">Days</span>${esc(days)}</span>
          <span class="rmc-item"><span class="rmc-label">Lookahead</span>${route.lookahead_weeks} weeks</span>
          <span class="rmc-item"><span class="rmc-label">Last scan</span>${esc(scanned)}</span>
        </div>
      </div>`;
  }).join('');
}

/* ── Disruption list ── */
function renderDisruptionList(routes) {
  const list = document.getElementById('disruptionList');
  const entries = [];
  for (const route of routes) {
    for (const [iso, dayData] of Object.entries(route.per_day || {})) {
      if (dayData.status !== 'disrupted') continue;
      entries.push({ iso, route, dayData });
    }
  }
  entries.sort((a, b) => a.iso.localeCompare(b.iso) || a.route.id - b.route.id);

  if (!entries.length) {
    list.innerHTML = `
      <div class="clear-state" style="margin-top:1rem">
        <div class="clear-state-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2ec76a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="clear-state-label">No disruptions detected</div>
        <div class="clear-state-next">All monitored dates are clear</div>
      </div>`;
    return;
  }

  list.innerHTML = entries.map(({ iso, route, dayData }) => {
    const disrupted = (dayData.legs || []).filter(l => l.status === 'DISRUPTED');
    const legsHtml = disrupted.map(leg => `
      <div class="rdc-leg">
        <div class="rdc-leg-dir">${esc(leg.label)}</div>
        ${leg.issues.map(issue => `
          <div class="rdc-leg-reason">${issueIconSvg(issue.type)} ${esc(issue.title)}</div>`).join('')}
      </div>`).join('');
    return `
      <div class="rdc">
        <div class="rdc-meta">
          <span class="rdc-date">${esc(formatDateShort(iso))}</span>
          <span class="rdc-route">${esc(route.display_name)}</span>
        </div>
        <div class="rdc-legs">${legsHtml}</div>
      </div>`;
  }).join('');
}

/* ── Day-detail modal ── */
function showDayDetail(iso, routeDetails) {
  document.getElementById('day-detail-title').textContent = formatDateFull(iso);
  const body = document.getElementById('day-detail-body');

  const hasDisruptions = routeDetails.some(({ dayData }) =>
    (dayData.legs || []).some(l => l.status === 'DISRUPTED')
  );

  if (!hasDisruptions) {
    body.innerHTML = `<div class="clear-state" style="min-height:80px">
      <div class="clear-state-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2ec76a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="clear-state-label" style="font-size:16px">No disruptions</div>
    </div>`;
    openModal('day-detail-modal');
    return;
  }

  body.innerHTML = routeDetails.map(({ route, dayData }) => {
    const disrupted = (dayData.legs || []).filter(l => l.status === 'DISRUPTED');
    if (!disrupted.length) return '';
    const legsHtml = disrupted.map(leg => `
      <div class="day-detail-leg">
        <div class="day-detail-leg-header">
          <span class="day-detail-leg-label">${esc(leg.label)}</span>
        </div>
        ${leg.issues.map(issue => `
          <div class="issue-row">
            <div class="issue-icon-tile">${issueIconSvg(issue.type)}</div>
            <div class="issue-row-body">
              <div class="issue-row-title-line">
                <span class="issue-row-title">${esc(issue.title)}</span>
                ${issue.pill ? `<span class="issue-pill">${esc(issue.pill)}</span>` : ''}
              </div>
            </div>
          </div>`).join('')}
      </div>`).join('');
    return `
      <div style="margin-bottom:1rem">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem">${esc(route.display_name)}</div>
        ${legsHtml}
      </div>`;
  }).join('<hr style="border:none;border-top:1px solid var(--border-sub);margin:.75rem 0">');

  openModal('day-detail-modal');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

/* ── Main loader ── */
async function loadKiosk() {
  const routes = await fetchJSON('/api/kiosk').catch(() => []);

  if (!routes.length) {
    document.getElementById('calPanel').innerHTML =
      '<div class="info-msg" style="padding:2rem">No kiosk routes configured.</div>';
    document.getElementById('disruptionList').innerHTML = '';
    return;
  }

  const { dayMap, allScanDays } = buildDayMap(routes);
  renderCalendar(routes, dayMap, allScanDays);
  renderRoutesList(routes);
  renderDisruptionList(routes);

  const scannedAt = routes.find(r => r.last_scanned_at)?.last_scanned_at;
  document.getElementById('kiosk-footer').textContent =
    scannedAt ? `Last scan: ${scannedAt.slice(0, 16)} UTC · Refreshes every 5 minutes` : 'Refreshes every 5 minutes';
}

updateClock();
setInterval(updateClock, 1000);
loadKiosk();
setInterval(loadKiosk, 300000);
</script>
</body>
</html>
